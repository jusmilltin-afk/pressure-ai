<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Контроль Тиску AI - 2026 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --brand-primary: #6366f1;
            --bg-dark: #0f172a;
        }
        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .camera-viewport {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            background: #000;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scanner-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .scan-frame {
            width: 80%;
            height: 80%;
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 1.5rem;
            position: relative;
        }
        .scan-frame::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--brand-primary);
            box-shadow: 0 0 15px var(--brand-primary);
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .corner-mark {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid var(--brand-primary);
        }
        .c-tl { top: -4px; left: -4px; border-right: 0; border-bottom: 0; border-radius: 1.5rem 0 0 0; }
        .c-tr { top: -4px; right: -4px; border-left: 0; border-bottom: 0; border-radius: 0 1.5rem 0 0; }
        .c-bl { bottom: -4px; left: -4px; border-right: 0; border-top: 0; border-radius: 0 0 0 1.5rem; }
        .c-br { bottom: -4px; right: -4px; border-left: 0; border-top: 0; border-radius: 0 0 1.5rem 0; }

        .loading-state {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .input-group-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .pulse-circle {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header Section -->
    <header class="w-full max-w-md mt-4 mb-8 flex items-center justify-between px-2">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fas fa-heart-pulse text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight uppercase">Контроль Тиску</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Версія: 03.04.2026</p>
            </div>
        </div>
        <div id="api-status" class="flex items-center gap-2 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
            <div class="w-2 h-2 rounded-full bg-emerald-500 pulse-circle"></div>
            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tight">System Online</span>
        </div>
    </header>

    <main class="w-full max-w-md space-y-6">
        
        <!-- Viewport -->
        <div class="camera-viewport">
            <video id="video-feed" autoplay playsinline muted></video>
            
            <div class="scanner-overlay">
                <div class="scan-frame">
                    <div class="corner-mark c-tl"></div>
                    <div class="corner-mark c-tr"></div>
                    <div class="corner-mark c-bl"></div>
                    <div class="corner-mark c-br"></div>
                </div>
            </div>

            <div class="absolute bottom-10 left-0 right-0 text-center">
                <span class="bg-black/40 backdrop-blur-md text-[10px] text-white/70 px-4 py-2 rounded-full uppercase tracking-tighter">
                    Тримайте смартфон рівно
                </span>
            </div>

            <!-- Loading State -->
            <div id="loading" class="loading-state">
                <div class="relative w-20 h-20 mb-4">
                    <div class="absolute inset-0 border-4 border-indigo-500/20 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <p class="text-indigo-400 font-black text-sm tracking-widest animate-pulse">ЗВ'ЯЗОК З AI ХМАРОЮ...</p>
            </div>
        </div>

        <!-- Metrics Display -->
        <div class="grid grid-cols-3 gap-3">
            <div class="input-group-card p-5 rounded-[2.5rem] text-center">
                <label class="block text-[8px] text-slate-500 font-black uppercase mb-2">SYS</label>
                <input type="number" id="sys-val" placeholder="--" class="bg-transparent w-full text-3xl font-black text-center outline-none text-white selection:bg-indigo-500">
            </div>
            <div class="input-group-card p-5 rounded-[2.5rem] text-center">
                <label class="block text-[8px] text-slate-500 font-black uppercase mb-2">DIA</label>
                <input type="number" id="dia-val" placeholder="--" class="bg-transparent w-full text-3xl font-black text-center outline-none text-white selection:bg-indigo-500">
            </div>
            <div class="input-group-card p-5 rounded-[2.5rem] text-center">
                <label class="block text-[8px] text-slate-500 font-black uppercase mb-2">PULSE</label>
                <input type="number" id="pulse-val" placeholder="--" class="bg-transparent w-full text-3xl font-black text-center outline-none text-white selection:bg-indigo-500">
            </div>
        </div>

        <!-- Capture Trigger -->
        <button id="capture-trigger" class="w-full bg-white text-slate-950 py-6 rounded-[2.5rem] font-black text-lg shadow-2xl shadow-white/10 active:scale-95 transition-all flex items-center justify-center gap-3">
            <i class="fas fa-brain text-2xl"></i>
            АНАЛІЗУВАТИ
        </button>

        <!-- Message Box -->
        <div id="status-msg" class="hidden p-4 rounded-3xl text-xs text-center font-bold"></div>

        <!-- History -->
        <section class="mt-8">
            <div class="flex items-center justify-between px-2 mb-4">
                <h3 class="font-black text-sm uppercase tracking-widest text-slate-400">Журнал 2026</h3>
                <span id="counter" class="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-slate-400">0</span>
            </div>
            <div id="log-list" class="space-y-3"></div>
        </section>
    </main>

    <canvas id="offscreen-canvas" class="hidden"></canvas>

    <script>
        // УВАГА: Для роботи на GitHub Pages вставте свій API Key нижче
        const apiKey = ""; 
        const MODEL_ID = "gemini-2.5-flash-preview-09-2025";
        
        const elements = {
            video: document.getElementById('video-feed'),
            canvas: document.getElementById('offscreen-canvas'),
            btn: document.getElementById('capture-trigger'),
            load: document.getElementById('loading'),
            log: document.getElementById('log-list'),
            sys: document.getElementById('sys-val'),
            dia: document.getElementById('dia-val'),
            pulse: document.getElementById('pulse-val'),
            status: document.getElementById('status-msg')
        };

        function updateUI(msg, type = 'info') {
            elements.status.innerText = msg;
            elements.status.className = `p-4 rounded-3xl text-xs text-center font-bold block ${
                type === 'error' ? 'bg-red-500/20 text-red-400' : 'bg-indigo-500/10 text-indigo-400'
            }`;
            setTimeout(() => elements.status.classList.add('hidden'), 6000);
        }

        async function initStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 } }
                });
                elements.video.srcObject = stream;
            } catch (err) {
                updateUI("Доступ до камери заблоковано.", "error");
            }
        }

        async function analyzeWithAI(base64Image) {
            // Фіксована структура URL для уникнення 404
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    role: "user", // Обов'язкове поле для мультимодальних запитів
                    parts: [
                        { text: "Аналізуй фото тонометра. Поверни JSON: {\"sys\": number, \"dia\": number, \"pulse\": number}. Тільки JSON." },
                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                    ]
                }],
                generationConfig: {
                    responseMimeType: "application/json"
                }
            };

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                if (response.status === 404) throw new Error("Помилка 404: Модель не знайдена. Перевірте API ключ.");
                if (response.status === 403) throw new Error("Помилка 403: Доступ заборонено (недійсний ключ).");
                throw new Error(`Помилка сервера: ${response.status}`);
            }

            const result = await response.json();
            const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
            return JSON.parse(responseText);
        }

        elements.btn.addEventListener('click', async () => {
            if (!apiKey && window.location.hostname !== 'localhost' && !window.location.hostname.includes('google')) {
                updateUI("ВІДСУТНІЙ API KEY! Додайте його в код для роботи на GitHub.", "error");
                return;
            }

            elements.btn.disabled = true;
            elements.load.style.display = 'flex';

            const context = elements.canvas.getContext('2d');
            elements.canvas.width = 1024;
            elements.canvas.height = 1024;
            
            const vWidth = elements.video.videoWidth;
            const vHeight = elements.video.videoHeight;
            const size = Math.min(vWidth, vHeight);
            const startX = (vWidth - size) / 2;
            const startY = (vHeight - size) / 2;
            
            context.drawImage(elements.video, startX, startY, size, size, 0, 0, 1024, 1024);
            const base64Data = elements.canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            try {
                const data = await analyzeWithAI(base64Data);
                if (data) {
                    elements.sys.value = data.sys || '';
                    elements.dia.value = data.dia || '';
                    elements.pulse.value = data.pulse || '';
                    saveEntry(data.sys, data.dia, data.pulse);
                    updateUI("Дані успішно зчитано!");
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            } catch (err) {
                updateUI(err.message, "error");
            } finally {
                elements.load.style.display = 'none';
                elements.btn.disabled = false;
            }
        });

        function saveEntry(sys, dia, pulse) {
            const time = new Date().toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
            const item = document.createElement('div');
            item.className = 'input-group-card p-5 rounded-[2rem] flex justify-between items-center';
            item.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="text-[10px] font-black text-indigo-500 bg-indigo-500/10 px-3 py-1 rounded-full">${time}</div>
                    <div class="font-black text-xl text-white">${sys || '--'}/${dia || '--'}</div>
                </div>
                <div class="text-right">
                    <span class="font-black text-indigo-400 text-lg">${pulse || '--'}</span>
                </div>
            `;
            elements.log.prepend(item);
            document.getElementById('counter').innerText = elements.log.children.length;
        }

        window.onload = initStream;
    </script>
</body>
</html>
